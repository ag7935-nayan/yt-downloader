<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gurukul YouTube Downloader</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img
    src="images.jpg"
    class="logo"
  >

  <!-- HEADING -->
  <h1>
    <span>YouTube</span> Video Downloader
  </h1>

  <!-- BOX -->
  <div class="download-box">

    <div class="input-box">

      <input
        type="text"
        id="videoUrl"
        placeholder="Paste YouTube link here..."
      >

    </div>

    <button onclick="getVideoInfo()">
      Fetch Video
    </button>

    <!-- PREVIEW -->
    <div id="preview" class="hidden">

      <img id="thumbnail">

      <h2 id="title"></h2>

      <div class="buttons">

        <button onclick="downloadVideo()">
          Download Video
        </button>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
